stages:
  - build
  - test
  - unit
  - deploy

npm_build:
  stage: build
  image: node:22-alpine
  script:
    - node --version
    - npm install
    - npm ci
    - npm run build

  artifacts:
    paths:
      - build/

npm_test_artifacts:
  stage: test
  image: node:22-alpine
  dependencies:
    - npm_build
  script:
    - test -f build/index.html

unit_test:
  stage: test
  image: node:22-alpine
  script:
    - npm install
    - npm ci
    - npm test
  artifacts:
    when: always
    reports:
      junit: reports/junit.xml

netlify:
  image: node:22-alpine
  stage : deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    NETLIFY_SITE_ID: "7924d100-467c-4fe6-912d-c16cdd178bd3"
  script:
    - npm install -g netlify-cli@20.1.1
    - netlify --version
    - netlify status
    - echo "Deploying to Netlify $NETLIFY_SITE_ID"
    - netlify deploy --prod --dir build
    - apk add curl
    - curl "https://bhekani-tut.netlify.app" | grep 'GitLab'


py_test:
  stage: build
  image: python:3.12-alpine
  script:
    - python --version
    - pip install --upgrade pip
    - pip install build
    - python src/hello.py
