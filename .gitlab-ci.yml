stages:
  - build
  - test

npm_test:
  stage: build
  image: node:22-alpine
  script:
    - node --version
    - npm install
    - npm ci
    - npm run build

  artifacts:
    paths:
      - build/

npm_test_artifacts:
  stage: test
  image: node:22-alpine
  dependencies:
    - npm_test
  script:
    - ls -la build/indexs.html
    - echo "Artifacts from npm_test are available."

py_test:
  stage: build
  image: python:3.12-alpine
  script:
    - python --version
    - pip install --upgrade pip
    - pip install build
    - python src/hello.py
